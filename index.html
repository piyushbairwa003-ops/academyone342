<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProGamer – India's Free Gaming Hub</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800;900&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --blue:#1565c0;--blue3:#42a5f5;
      --red2:#ef5350;--gold:#ffd600;
      --dark:#04080f;
    }
    .wrap{font-family:'Poppins',sans-serif;background:var(--dark);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px 20px;position:relative;overflow:hidden;}
    .bg{position:absolute;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(21,101,192,0.28) 0%,transparent 55%),radial-gradient(ellipse at 80% 100%,rgba(211,47,47,0.18) 0%,transparent 55%);pointer-events:none;}
    .grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(21,101,192,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(21,101,192,0.05) 1px,transparent 1px);background-size:36px 36px;animation:gridMove 20s linear infinite;pointer-events:none;}
    @keyframes gridMove{0%{background-position:0 0}100%{background-position:36px 36px}}
    .top-bar{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue),var(--blue3),var(--gold),var(--red2),var(--blue3),var(--blue));background-size:300% auto;animation:barFlow 3s linear infinite;z-index:10;}
    @keyframes barFlow{0%{background-position:0% center}100%{background-position:300% center}}
    .content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;width:100%;max-width:360px;gap:16px;text-align:center;}
    .tagline{font-size:13px;color:rgba(255,255,255,.38);font-weight:500;line-height:1.75;}
    .tagline .t1{color:var(--blue3);font-weight:700;}
    .tagline .t2{color:var(--gold);font-weight:700;}
    .topics{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;width:100%;}
    .tp{background:rgba(21,101,192,.08);border:1px solid rgba(21,101,192,.20);border-radius:9px;padding:10px 8px;text-align:center;}
    .tp-icon{font-size:22px;display:block;margin-bottom:4px;}
    .tp-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.60);line-height:1.3;}
    .tp-sub{font-size:8px;color:rgba(255,255,255,.25);margin-top:2px;}
    .btn{position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;width:100%;padding:16px 28px;border-radius:10px;background:linear-gradient(135deg,#1db954,#25d366,#128c7e);background-size:200% auto;color:#fff;font-family:'Poppins',sans-serif;font-weight:800;font-size:16px;letter-spacing:.10em;text-transform:uppercase;text-decoration:none;border:none;cursor:pointer;box-shadow:0 6px 28px rgba(37,211,102,.40);animation:btnPulse 2.2s ease-in-out infinite,gSlide 3s linear infinite;}
    .btn::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.20),transparent);transform:translateX(-100%);animation:shimmer 2.4s ease-in-out infinite;}
    @keyframes shimmer{0%{transform:translateX(-100%)}55%,100%{transform:translateX(100%)}}
    @keyframes btnPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.04);box-shadow:0 10px 38px rgba(37,211,102,.60);}}
    @keyframes gSlide{0%{background-position:0% center}100%{background-position:200% center}}
    .btn-inner{position:relative;z-index:1;display:flex;align-items:center;gap:10px;}
    .wa-icon{width:22px;height:22px;fill:#fff;flex-shrink:0;}
  </style>
</head>
<body>

<div class="wrap">

  <div class="content">
